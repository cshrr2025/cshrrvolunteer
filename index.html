<!DOCTYPE html>
<html>
<head>
    <title>CSHRR Volunteer Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .bookmark-alert { color: #d9534f; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Redirecting to Volunteer Portal...</h1>
    <p class="bookmark-alert">STOP! Please bookmark this URL (www.cshrrvolunteer.us) now!</p>
    <p>If you are not redirected in 5 seconds, <a href="YOUR_GOOGLE_SCRIPT_URL">click here</a>.</p>

    <script>
        setTimeout(function(){
            window.location.href = "YOUR_GOOGLE_SCRIPT_URL";
        }, 4000); // 4 second delay to give them time to bookmark
    </script>
</body>
</html>
